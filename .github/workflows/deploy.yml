name: Deploy to Hosting

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_mysql, dom, filter, gd, json, fileinfo, zip

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Create production .env
        run: |
          cat > .env << 'ENVEOF'
          APP_NAME="TSBL Invoice"
          APP_ENV=production
          APP_DEBUG=false
          APP_URL=https://invoice.transentertainment.id

          LOG_CHANNEL=stack
          LOG_LEVEL=error

          DB_CONNECTION=mysql
          DB_HOST=localhost
          DB_PORT=3306
          DB_DATABASE=transen2_tsbl_invoice
          DB_USERNAME=transen2_tsanirestya
          DB_PASSWORD=M@h4meru

          SESSION_DRIVER=file
          SESSION_LIFETIME=120

          CACHE_STORE=file
          QUEUE_CONNECTION=sync

          FILESYSTEM_DISK=local
          ENVEOF

          echo "APP_KEY=base64:ke0SmVRIq+5MCdD40vvCGFTwMDSvTrGC9m3tBEAeYm4=" >> .env
          sed -i 's/^[[:space:]]*//' .env

      - name: Cache config & routes
        run: |
          php artisan config:cache
          php artisan route:cache
          php artisan view:cache

      - name: Prepare webroot
        run: |
          mkdir -p _webroot
          cp -r public/. _webroot/

          cat > _webroot/index.php << 'EOF'
          <?php
          use Illuminate\Http\Request;
          define('LARAVEL_START', microtime(true));
          if (file_exists($maintenance = __DIR__ . '/../tsbl-invoice-laravel/storage/framework/maintenance.php')) {
              require $maintenance;
          }
          require __DIR__ . '/../tsbl-invoice-laravel/vendor/autoload.php';
          $app = require_once __DIR__ . '/../tsbl-invoice-laravel/bootstrap/app.php';
          $app->handleRequest(Request::capture());
          EOF
          sed -i 's/^[[:space:]]*//' _webroot/index.php

      - name: Deploy app → /tsbl-invoice-laravel/ (no vendor)
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./
          server-dir: /tsbl-invoice-laravel/
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            .env.example
            .env.local
            .env.testing
            **/tests/**
            **/Obsidian/**
            **/.github/**
            _webroot/**
            "data awal/**"
            **/storage/framework/cache/**
            **/storage/framework/sessions/**
            **/storage/framework/views/**
            **/storage/logs/**
            **/bootstrap/cache/**
            **/database/schema_export.sql
            **/database/seeds_export.sql

      - name: Deploy webroot → /invoice.transentertainment.id/
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./_webroot/
          server-dir: /invoice.transentertainment.id/
