name: Deploy to Hosting

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: mbstring, xml, ctype, iconv, intl, pdo, pdo_mysql, dom, filter, gd, json, fileinfo, zip

      - name: Install Composer dependencies
        run: composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist

      - name: Create production .env
        run: |
          cat > .env << 'ENVEOF'
          APP_NAME="TSBL Invoice"
          APP_ENV=production
          APP_DEBUG=false
          APP_URL=https://invoice.transentertainment.id

          LOG_CHANNEL=stack
          LOG_LEVEL=error

          DB_CONNECTION=mysql
          DB_HOST=localhost
          DB_PORT=3306
          DB_DATABASE=transen2_tsbl_invoice
          DB_USERNAME=transen2_tsanirestya
          DB_PASSWORD=M@h4meru

          SESSION_DRIVER=file
          SESSION_LIFETIME=120

          CACHE_STORE=file
          QUEUE_CONNECTION=sync

          FILESYSTEM_DISK=local
          ENVEOF

          echo "APP_KEY=base64:ke0SmVRIq+5MCdD40vvCGFTwMDSvTrGC9m3tBEAeYm4=" >> .env
          sed -i 's/^[[:space:]]*//' .env

      - name: Prepare webroot
        run: |
          mkdir -p _webroot
          cp -r public/. _webroot/

          cat > _webroot/index.php << 'EOF'
          <?php
          use Illuminate\Http\Request;
          define('LARAVEL_START', microtime(true));
          if (file_exists($maintenance = __DIR__ . '/../../tsbl-invoice-laravel/storage/framework/maintenance.php')) {
              require $maintenance;
          }
          require __DIR__ . '/../../tsbl-invoice-laravel/vendor/autoload.php';
          $app = require_once __DIR__ . '/../../tsbl-invoice-laravel/bootstrap/app.php';
          $app->handleRequest(Request::capture());
          EOF
          sed -i 's/^[[:space:]]*//' _webroot/index.php

      - name: Create Deployment Packages (Zip)
        run: |
          # Create App Zip (exclude git, node_modules, and other zips)
          zip -r app.zip . -x ".git/*" "node_modules/*" "_webroot/*" "tests/*" "Obsidian/*" ".github/*" "storage/logs/*" "*.zip" "deploy_bridge.php"
          
          # Create Web Zip (Include index.php and the bridge)
          cd _webroot && zip -r ../web.zip . && cd ..
          
          # Prepare dist folders for clean FTP upload
          mkdir -p dist_app dist_web
          mv app.zip dist_app/
          mv web.zip deploy_bridge.php file_check.php dist_web/

      - name: Upload App Package
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist_app/
          server-dir: /tsbl-invoice-laravel/
          state-name: .ftp-deploy-sync-state-zip-app.json

      - name: Upload Web Package & Bridge
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: ./dist_web/
          server-dir: /invoice.transentertainment.id/
          state-name: .ftp-deploy-sync-state-zip-web.json

      - name: Trigger Remote Unzip
        run: |
          # Generate token matching deploy_bridge.php logic (using UTC)
          TOKEN="tsbl_deploy_$(date -u +'%Y%m%d')"
          echo "Debug: Sending token $TOKEN"
          echo "Extracting App..."
          curl -i -sS "https://invoice.transentertainment.id/deploy_bridge.php?token=$TOKEN&target=app"
          echo "Extracting Web..."
          curl -i -sS "https://invoice.transentertainment.id/deploy_bridge.php?token=$TOKEN&target=web"
          
      - name: Final Cleanup
        run: |
          TOKEN="tsbl_deploy_$(date +'%Y%m%d')"
          # The bridge deletes zip files automatically, but we should remove the bridge itself
          # (Optional: for now we keep it for debugging if needed, or add a cleanup step)
          echo "Deployment Finished Successfully."
